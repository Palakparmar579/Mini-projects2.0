<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e6f0ff, #f3e8ff);
    }

    .calculator {
      width: 320px;
      padding: 20px;
      border-radius: 25px;
      background: #ffffffcc;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .display {
      height: 80px;
      border-radius: 15px;
      background: #f0f4ff;
      margin-bottom: 20px;
      text-align: end;
      padding: 35px 17px 0;
      font-size: 23px;
      overflow: auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      background: #f4f6fb;
    }

    .op { background: #e6d9ff; }
    .equal { background: #d4f5e9; }
    .clear { grid-column: span 3; background: #ffe4ec; }
  </style>
</head>

<body>

<div class="calculator">
  <div class="display">0</div>

  <div class="buttons">
    <button class="delete">⌫</button>
    <button class="op">/</button>
    <button class="op">*</button>
    <button class="op">-</button>

    <button>9</button>
    <button>8</button>
    <button>7</button>
    <button class="op">+</button>

    <button>6</button>
    <button>5</button>
    <button>4</button>
    <button>3</button>

    <button>2</button>
    <button>1</button>
    <button>0</button>
    <button>.</button>

    <button class="equal">=</button>
    <button class="clear">C</button>
  </div>
</div>

<script>
let display = document.querySelector(".display");
let buttons = document.querySelectorAll("button");

let currentInput = "";


function isValid(value) {
  let operators = ["+", "-", "*", "/"];

 
  if (currentInput === "" && operators.includes(value) && value !== "-") {
    return false;
  }

  
  if (value === ".") {
    let parts = currentInput.split(/[+\-*/]/);
    let lastNumber = parts[parts.length - 1];
    if (lastNumber.includes(".")) return false;
  }

  return true;
}

let maxLength=10;
buttons.forEach((btn) => {
  btn.addEventListener("click", () => {
    let value = btn.innerText;
    let operators = ["+", "-", "*", "/"];
    let last = currentInput.slice(-1);

    if (value === "C") {
      currentInput = "";
    } 
    else if (value === "⌫") {
      currentInput = currentInput.slice(0, -1);
    }
    else if (value === "=") {
     
          currentInput = eval(currentInput).toString();
          display.innerText=currentInput
    } 
    else {
      if (operators.includes(last) && operators.includes(value)) {
        currentInput = currentInput.slice(0, -1) + value;
      } 
      else {
        if (isValid(value)) {
          if (currentInput.length >= maxLength) {
            return;
          }

          currentInput += value;
        }
      }
    }
    display.innerText = currentInput || "0";
  });
});
</script>

</body>
</html>
