<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drum Kit</title>

  <style>
    body {
      text-align: center;
      background: #5ad3ff7b;
      font-family: 'Arial', sans-serif;
      margin-top: 80px;
      color: white;
    }

    h1 {
      color: #f1c40f;
      font-size: 3rem;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      margin-bottom: 50px;
    }

    .btn {
      padding: 60px 50px;
      margin: 15px;
      font-size: 20px;
      font-weight: 600;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      color: white;
      background-size: cover;
      background-repeat: no-repeat;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

   
    
  </style>
</head>

<body>

  <h1>🥁 Drum Kit</h1>

 
  <button class="btn" data-sound="crash" style="background-image:url(./images/Adjustable\ cymbal\ stand\ with\ crash\ cymbal.png);color: rgb(99, 97, 97);">Crash</button>
  <button class="btn" data-sound="kick" style="background-image:url(./images/transparent_drum.png)">Kick</button>
  <button class="btn" data-sound="snare" style="background-image:url(./images/transparent_snore.png)">Snare</button>
  <button class="btn" data-sound="tom" style="background-image:url(./images/tom.png)">Tom</button>

  <!-- Audio -->
  <audio id="crash" src="./sounds/crash.mp3"></audio>
  <audio id="kick" src="./sounds/projects_drum-kits_sounds_kick.mp3"></audio>
  <audio id="snare" src="./sounds/snare.mp3"></audio>
  <audio id="tom" src="./sounds/tom.mp3"></audio>

<script>
   const buttons = document.querySelectorAll(".btn");

buttons.forEach((btn)=>{
    btn.addEventListener('click',()=>{
        const sound = btn.getAttribute("data-sound");
        const audio = document.getElementById(sound);
        audio.play();
    })
})

// keyboard support
window.addEventListener('keypress',(e)=>{
const key = e.key;
if(key === "c"){
    playsound("crash")
}
if(key === "k"){
    playsound("kick")
}
if(key === "s"){
    playsound("snare")
}
if(key === "t"){
    playsound("tom")
}

function playsound(name)
{
const audio = document.getElementById(name);
audio.play();
}
})
</script>
</body>
</html>
